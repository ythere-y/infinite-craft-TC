# Legacy / paused configuration.
# EdgeOne Makers is the active deployment target. This file is intentionally
# outside the repository root so Render Blueprint is not the default workflow.
# Review service plans, persistence and secrets before any future reuse.
services:
  - type: web
    name: infinite-craft-tc
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: prod
      - key: REDIS_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://api.deepseek.com
      - key: LLM_MODEL
        value: deepseek-v4-flash
      - key: LLM_TIMEOUT
        value: "20"
      - key: LLM_MAX_RETRIES
        value: "0"
      - key: LLM_REASONING_EFFORT
        value: ""
      - key: LLM_THINKING_ENABLED
        value: "false"
